name: Bug Report
description: Report a bug or unexpected behavior in LazyChess
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: e.g. Calling `game.do_move("e1g1")` panics when the king has already moved.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: rust
      placeholder: |
        use lazychess::Game;

        fn main() {
            let mut game = Game::new();
            // steps that trigger the bug
        }
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: e.g. The move should be rejected with an error since castling rights were lost.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages, panics, or wrong output.
      render: text
      placeholder: |
        thread 'main' panicked at 'index out of bounds: ...'
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of LazyChess is affected?
      options:
        - Game / Board logic
        - Move generation / validation
        - FEN / PGN parsing
        - Opening book
        - UCI engine (UciEngine)
        - Move Analyzer / Classification
        - Pondering
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: LazyChess version
      description: Run `cargo pkgid lazychess` or check your `Cargo.toml`.
      placeholder: e.g. 0.1.1
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust version
      description: Run `rustc --version`.
      placeholder: e.g. rustc 1.78.0 (9b00956e5 2024-04-29)
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 22.04 / Windows 11 / macOS 14
    validations:
      required: false

  - type: input
    id: engine
    attributes:
      label: UCI engine (if applicable)
      description: If the bug involves UCI/analysis features, specify the engine and version.
      placeholder: e.g. Stockfish 18
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, FEN strings, PGN snippets, or screenshots that might help.
    validations:
      required: false
